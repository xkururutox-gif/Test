<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Kurayami DOOM</title>
<style>
  body {
    margin: 0;
    overflow: hidden;
    background: black;
  }
  canvas {
    display: block;
  }
</style>
</head>
<body>

<canvas id="doom"></canvas>

<script>
const canvas = document.getElementById("doom");
const ctx = canvas.getContext("2d");

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener("resize", resize);
resize();

let player = { x: 3, y: 3, angle: 0 };

const map = [
  "1111111111",
  "1000000001",
  "1011111101",
  "1000000101",
  "1011100101",
  "1000100001",
  "1111111111"
];

const FOV = Math.PI / 3;
const depth = 16;
const keys = {};

document.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
document.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

function castRay(angle) {
  let distance = 0;
  while (distance < depth) {
    let testX = Math.floor(player.x + Math.cos(angle) * distance);
    let testY = Math.floor(player.y + Math.sin(angle) * distance);
    if (map[testY] && map[testY][testX] === "1") return distance;
    distance += 0.05;
  }
  return depth;
}

function update() {
  if (keys["w"]) {
    player.x += Math.cos(player.angle) * 0.05;
    player.y += Math.sin(player.angle) * 0.05;
  }
  if (keys["s"]) {
    player.x -= Math.cos(player.angle) * 0.05;
    player.y -= Math.sin(player.angle) * 0.05;
  }
  if (keys["a"]) player.angle -= 0.05;
  if (keys["d"]) player.angle += 0.05;
}

function draw() {
  ctx.fillStyle = "black";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  for (let x = 0; x < canvas.width; x++) {
    const rayAngle = player.angle - FOV/2 + (x / canvas.width) * FOV;
    const distance = castRay(rayAngle);

    const wallHeight = canvas.height / distance;
    const shade = 255 - Math.min(distance * 15, 200);

    ctx.fillStyle = `rgb(${shade},0,${shade})`;
    ctx.fillRect(x, canvas.height/2 - wallHeight/2, 1, wallHeight);
  }
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
